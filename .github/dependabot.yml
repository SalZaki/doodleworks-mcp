# Dependabot config: weekly grouped npm/pnpm updates.
#
# No `registries:` block: Dependabot already resolves npm against the public
# registry (registry.npmjs.org) by default, and there is no repo `.npmrc`
# redirecting it elsewhere. A `registries:` entry of `type: npm-registry` must
# carry a `token` (the schema requires url+token, or url+username+password), so
# the earlier public-registry block was invalid and made Dependabot reject the
# whole file.
version: 2

updates:
  - package-ecosystem: "npm"   # also covers pnpm
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    groups:
      all-dependencies:
        patterns:
          - "*"
    commit-message:
      prefix: "chore(deps)"
