name: release

# release-please opens/updates a Release PR; merging it creates the tag +
# GitHub Release, which triggers publish-npm. The workflow_dispatch path runs
# publish-npm directly for the one-time v1.0.0 bootstrap.
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      publish_ref:
        description: "git ref/tag to build and publish (e.g. v1.0.0)"
        required: true
        default: "v1.0.0"

# Least privilege at the top level; the release-please job opts into the
# writes it needs (Scorecard Token-Permissions: top-level writes floor the score).
permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the tag + GitHub Release + release-PR commits
      pull-requests: write # open/update the Release PR
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - id: rp
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  publish-npm:
    needs: release-please
    # Run after a real release, OR on a manual dispatch (the 1.0.0 bootstrap).
    # always() is needed so the dispatch path isn't skipped when the release-please job is skipped.
    if: ${{ always() && (needs.release-please.outputs.release_created == 'true' || github.event_name == 'workflow_dispatch') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # OIDC for npm trusted publishing + provenance
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_ref || needs.release-please.outputs.tag_name }}
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          cache: pnpm
          # registry-url is REQUIRED so npm targets npmjs.org and triggers OIDC
          # trusted publishing. Do NOT set NODE_AUTH_TOKEN on the publish step:
          # with a Trusted Publisher configured on the package + id-token: write,
          # npm uses OIDC and ignores setup-node's placeholder token. (Omitting
          # registry-url instead makes npm fail with ENEEDAUTH.)
      - name: Upgrade npm (OIDC trusted publishing needs a recent npm)
        # Pinned to an exact version (Scorecard Pinned-Dependencies); bump deliberately.
        # OIDC trusted publishing requires npm >= 11.5.1.
        run: npm install -g npm@11.17.0
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - name: Smoke-test the packed tarball
        run: node scripts/smoke-pack.mjs
      - name: Publish to npm with provenance
        # Keyless: authenticates via npm OIDC trusted publishing (configured on the
        # doodleworks-mcp package on npmjs.com) — no token. --provenance attests via
        # id-token: write (above). The one-time NPM_TOKEN bootstrap is retired.
        run: npm publish --provenance --access public --ignore-scripts

  publish-registry:
    needs: [release-please, publish-npm]
    # After the npm package is live, publish server.json to the official MCP
    # registry. Only on a real release — skipped on the workflow_dispatch npm
    # re-publish path (that version is already registered). Keyless: GitHub OIDC.
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC auth to the MCP registry (mcp-publisher login github-oidc)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
      - name: Install mcp-publisher
        # Pinned to a release (Scorecard Pinned-Dependencies); bump deliberately.
        run: |
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/download/v1.7.9/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher
      - name: Authenticate to the MCP registry (GitHub OIDC)
        run: ./mcp-publisher login github-oidc
      - name: Publish server.json to the MCP registry
        run: ./mcp-publisher publish
