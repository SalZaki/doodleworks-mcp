name: scorecard

# OpenSSF Scorecard supply-chain security analysis. Scores the repo against
# security best practices (branch protection, pinned dependencies, token
# permissions, code scanning, dangerous workflows, ...). Results publish to the
# public Scorecard API that backs the README badge, and also surface under
# Security -> Code scanning. Public repos only. Not a merge gate.
on:
  # Re-score when branch-protection settings change (a tracked Scorecard signal).
  branch_protection_rule:
  push:
    branches: [main]
  schedule:
    - cron: "41 3 * * 1" # weekly, Monday 03:41 UTC

# Least privilege by default; the analysis job opts into exactly what it needs.
permissions: read-all

# Don't pile up redundant analyses on rapid pushes to the same ref.
concurrency:
  group: scorecard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write # upload SARIF results to code scanning
      id-token: write # OIDC token to publish results to the public Scorecard API
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Publish to the public Scorecard API so the README badge resolves.
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload to code scanning
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: results.sarif
