name: codeql

# GitHub CodeQL static analysis for the TypeScript/JavaScript source. Results
# surface under Security → Code scanning. Free for public repos. Not a required
# status check — it reports findings, it does not gate merges.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "27 3 * * 1" # weekly, Monday 03:27 UTC

permissions:
  contents: read

# Don't pile up redundant analyses on rapid pushes to the same ref.
concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write # upload results to code scanning
      actions: read # read workflow run metadata (needed on private repos; harmless here)
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: none # JS/TS is interpreted — CodeQL extracts from source, no build
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          # Broader security coverage than the default suite. Findings are
          # informational here (not a merge gate); swap to security-and-quality
          # to also include maintainability queries.
          queries: security-extended

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: "/language:${{ matrix.language }}"
