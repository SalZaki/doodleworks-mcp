<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Doodleworks MCP</title>
    <style>
      /* Colours live in CSS variables so the dark-mode block only overrides tokens — and so a
         future host-theme pass can map these onto the MCP host's --color-* variables. */
      :root {
        font-family: var(--font-sans, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif);
        color-scheme: light dark;
        --fg: var(--color-text-primary, #1a1a1a);
        --panel: var(--color-background-secondary, #fafaf8);
        --border: var(--color-border-primary, rgba(0, 0, 0, 0.1));
        --border-strong: var(--color-border-secondary, rgba(0, 0, 0, 0.18));
        --btn-bg: var(--color-background-tertiary, #fff);
        --btn-hover: var(--color-background-ghost, #f2f2ef);
        --accent: var(--color-ring-info, #7fa8c9);
        --skeleton: var(--color-background-tertiary, rgba(0, 0, 0, 0.06));
        --skeleton-sheen: rgba(255, 255, 255, 0.45);
        --radius: var(--border-radius-md, 10px);
        --radius-sm: var(--border-radius-md, 7px);
      }
      /* Plain-browser dark fallback — only when the host hasn't injected its own theme tokens
         (mcp-app.ts adds .themed to <html> when it applies host style variables). */
      @media (prefers-color-scheme: dark) {
        html:not(.themed) {
          --fg: #f0f0f0;
          --panel: rgba(255, 255, 255, 0.04);
          --border: rgba(255, 255, 255, 0.15);
          --border-strong: rgba(255, 255, 255, 0.22);
          --btn-bg: rgba(255, 255, 255, 0.08);
          --btn-hover: rgba(255, 255, 255, 0.14);
          --skeleton: rgba(255, 255, 255, 0.06);
          --skeleton-sheen: rgba(255, 255, 255, 0.16);
        }
      }
      * { box-sizing: border-box; }
      /* The `hidden` attribute must always win: an element's class `display` (flex/block) would
         otherwise override the UA `[hidden]{display:none}`, leaving overlays (.zoom, .regen-overlay,
         .page-error) permanently on screen. */
      [hidden] { display: none !important; }
      body { margin: 0; padding: 12px; background: transparent; color: var(--fg); }
      .wrap { max-width: 920px; margin: 0 auto; }

      .head {
        display: flex; align-items: baseline; justify-content: space-between;
        gap: 12px; margin-bottom: 10px;
      }
      .title {
        font-size: 15px; font-weight: 600; min-width: 0;
        overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      }
      .meta { display: flex; align-items: baseline; gap: 10px; flex: 0 0 auto; white-space: nowrap; }
      .progress {
        font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 999px;
        border: 1px solid var(--border-strong); opacity: 0.85;
      }
      .counter { font-size: 13px; opacity: 0.8; max-width: 48vw; overflow: hidden; text-overflow: ellipsis; }

      .stage {
        background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius);
        padding: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 200px;
      }
      .empty { opacity: 0.7; font-size: 14px; }
      .frame {
        position: relative; width: 100%; border-radius: 4px; overflow: hidden;
        background: var(--skeleton);
      }
      .frame > * { position: absolute; inset: 0; }
      .frame img { width: 100%; height: 100%; object-fit: contain; display: block; cursor: zoom-in; }
      .skeleton {
        background: var(--skeleton);
        background-image: linear-gradient(100deg, transparent 30%, var(--skeleton-sheen) 50%, transparent 70%);
        background-size: 220% 100%; background-repeat: no-repeat;
        animation: shimmer 1.5s linear infinite;
      }
      @keyframes shimmer { from { background-position: 180% 0; } to { background-position: -80% 0; } }
      .page-error {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 10px; text-align: center; padding: 16px; font-size: 13px; opacity: 0.95;
      }
      /* Page title shown as a caption BELOW the image, never overlapping the artwork. Sits in
         normal flow under the frame (the frame is a fixed-aspect box the image fills), in the
         same sans family as the rest of the UI — matching the title burned into downloads. */
      .caption {
        margin-top: 8px; max-width: 88%;
        font-size: 14px; font-weight: 600; line-height: 1.3; color: var(--fg);
        text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        pointer-events: none;
      }
      .regen-overlay {
        display: flex; align-items: center; justify-content: center; gap: 8px;
        background: rgba(20, 20, 20, 0.5); color: #fff; font-size: 13px;
      }
      .spinner {
        width: 14px; height: 14px; border: 2px solid rgba(255, 255, 255, 0.4);
        border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      .status { font-size: 12px; opacity: 0.85; min-height: 16px; margin: 6px 2px; }

      .controls { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; margin: 10px 0; }
      .group { display: flex; gap: 8px; }
      .spacer { flex: 1; }
      button {
        font: inherit; font-size: 14px; font-weight: 500; padding: 9px 18px; border-radius: var(--radius-sm);
        border: 1px solid var(--border-strong); background: var(--btn-bg); color: var(--fg); cursor: pointer;
      }
      /* The in-frame Retry stays compact so it doesn't dominate the error state. */
      .page-error button { font-size: 13px; font-weight: 400; padding: 6px 14px; }
      button:hover:not(:disabled) { background: var(--btn-hover); }
      button:disabled { opacity: 0.4; cursor: default; }
      :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

      .strip { display: flex; gap: 8px; overflow-x: auto; padding: 4px 0 8px; }
      .thumb {
        flex: 0 0 auto; width: 104px; cursor: pointer; border-radius: 6px;
        border: 2px solid transparent; background: var(--panel); padding: 3px;
        color: inherit; font: inherit; text-align: left;
      }
      .thumb:hover { background: var(--btn-hover); }
      .thumb.active { border-color: var(--accent); }
      .thumb-media { width: 100%; border-radius: 3px; overflow: hidden; background: var(--skeleton); }
      .thumb-media.loading {
        background-image: linear-gradient(100deg, transparent 30%, var(--skeleton-sheen) 50%, transparent 70%);
        background-size: 220% 100%; background-repeat: no-repeat; animation: shimmer 1.5s linear infinite;
      }
      .thumb-media img { width: 100%; height: 100%; display: block; object-fit: cover; }
      .thumb .lbl {
        font-size: 10px; opacity: 0.85; margin-top: 2px; white-space: nowrap;
        overflow: hidden; text-overflow: ellipsis;
      }

      .toggle {
        display: inline-flex; align-items: center; gap: 6px; font-size: 13px;
        opacity: 0.85; cursor: pointer; user-select: none;
      }
      .toggle input { margin: 0; cursor: pointer; }

      /* Full-iframe zoom of the current image so the small annotations are readable. */
      .zoom {
        position: fixed; inset: 0; z-index: 50;
        display: flex; align-items: center; justify-content: center; padding: 16px;
        background: rgba(0, 0, 0, 0.85); cursor: zoom-out;
      }
      .zoom img { max-width: 100%; max-height: 100%; object-fit: contain; cursor: default; background: #fff; border-radius: 4px; }
      .zoom-close {
        position: absolute; top: 12px; right: 12px;
        width: 38px; height: 38px; padding: 0; border-radius: 50%;
        font-size: 18px; line-height: 1; background: rgba(255, 255, 255, 0.92); color: #1a1a1a;
        border: 1px solid rgba(0, 0, 0, 0.15);
      }

      @media (prefers-reduced-motion: reduce) {
        .skeleton, .thumb-media.loading { animation: none; }
        .spinner { animation-duration: 1.8s; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="head">
        <span class="title" id="set-title">Doodleworks MCP</span>
        <span class="meta">
          <span class="progress" id="progress" hidden></span>
          <span class="counter" id="counter"></span>
        </span>
      </div>

      <div class="stage">
        <span class="empty" id="empty">Waiting for the illustrations…</span>
        <div class="frame" id="frame" hidden>
          <img id="page-img" alt="" hidden />
          <div class="skeleton" id="skeleton" hidden></div>
          <div class="page-error" id="page-error" hidden>
            <span id="page-error-msg"></span>
            <button id="retry" type="button">Retry</button>
          </div>
          <div class="regen-overlay" id="regen-overlay" hidden>
            <span class="spinner"></span><span>Regenerating…</span>
          </div>
        </div>
        <div class="caption" id="caption" hidden></div>
      </div>

      <div class="status" id="status" role="status" aria-live="polite" aria-atomic="true"></div>

      <div class="controls">
        <div class="group">
          <button id="prev" type="button">‹ Prev</button>
          <button id="next" type="button">Next ›</button>
        </div>
        <span class="spacer"></span>
        <div class="group">
          <button id="zoom-btn" type="button">⤢ Zoom</button>
          <button id="regen" type="button">Regenerate</button>
          <button id="dl" type="button">Download PNG</button>
          <button id="dl-all" type="button">Download all</button>
          <label class="toggle"><input type="checkbox" id="burn-title" checked /> Title on PNG</label>
        </div>
      </div>

      <div class="strip" id="strip" aria-label="Illustrations"></div>

      <div class="zoom" id="zoom" hidden>
        <img id="zoom-img" alt="" />
        <button class="zoom-close" id="zoom-close" type="button" aria-label="Close zoom">✕</button>
      </div>
    </div>
    <script type="module" src="/src/mcp-app.ts"></script>
  </body>
</html>
